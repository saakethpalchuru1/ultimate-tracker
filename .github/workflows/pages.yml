# Build the Next.js static export and publish it to GitHub Pages.
# Trigger: on push to main (so a fresh data/*.json push from the Render
# cron re-deploys the site), plus a manual trigger. Concurrency cancels
# in-flight runs so back-to-back data pushes don't stack up.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache config: the repo doesn't ship a package-lock.json
          # (kept out so `npm install` resolves fresh on each run).

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          # GitHub Pages serves the site at <user>.github.io/<repo>/, so
          # asset URLs must be prefixed. configure-pages sets base_path
          # to "/<repo>" for project pages.
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Copy live data JSONs into the build output
        run: |
          mkdir -p frontend/out/data
          cp -v data/*.json frontend/out/data/ 2>/dev/null || echo "(no data files yet — site will still build)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
