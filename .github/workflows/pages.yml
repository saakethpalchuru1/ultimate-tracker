# Build the Next.js static export and publish it to GitHub Pages.
#
# IMPORTANT: this workflow only fires when FRONTEND CODE or the workflow
# itself changes. It does NOT fire on the cron's data/*.json pushes --
# those changes are picked up at runtime because the frontend fetches
# JSON directly from raw.githubusercontent.com (which auto-updates on
# every cron commit). This avoids the cancel-in-progress loop where a
# Next.js build (~60-90s) gets interrupted by the next 5-min cron tick.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Tell the frontend where to fetch live data from. We use the
          # raw.githubusercontent.com CDN so the latest cron commit is
          # always visible without rebuilding the static site.
          NEXT_PUBLIC_DATA_BASE_URL: https://raw.githubusercontent.com/saakethpalchuru1/ultimate-tracker/main/data
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
