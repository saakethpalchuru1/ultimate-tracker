# Render Blueprint — declares the cron job that scrapes USAU + pushes JSON to GitHub.
#
# Schedule: every 2 minutes. The in_run_window gate inside update_snapshots.py
# enforces game hours (08:30-20:00 America/Chicago Sat/Sun by default).
services:
  - type: cron
    name: usau-snapshot-cron
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    schedule: "*/2 * * * *"
    startCommand: python -m scripts.update_snapshots
    envVars:
      - key: RUN_WINDOW_TZ
        value: America/Chicago
      - key: RUN_WINDOW_START
        value: "08:30"
      - key: RUN_WINDOW_END
        value: "20:00"
      - key: RUN_WINDOW_DAYS
        value: "Sat,Sun"
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
