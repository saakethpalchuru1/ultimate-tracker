# Render Blueprint -- declares the cron job that scrapes USAU + pushes JSON to GitHub.
#
# To deploy:
#   1. Connect this GitHub repo to Render
#   2. Render auto-detects render.yaml and creates the cron service
#   3. Add env vars in the Render dashboard: GITHUB_TOKEN, GITHUB_REPO
#   4. The cron fires every 5 minutes; the in-window check in
#      update_snapshots.py enforces game hours (08:30-20:00 America/Chicago)
#
# Cron schedule is set to "every 5 minutes". The script's RUN_WINDOW gate
# is what enforces game-time. This avoids fragile timezone math in cron.

services:
  - type: cron
    name: usau-snapshot-cron
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    schedule: "*/5 * * * *"
    startCommand: python -m scripts.update_snapshots
    envVars:
      - key: RUN_WINDOW_TZ
        value: America/Chicago
      - key: RUN_WINDOW_START
        value: "08:30"
      - key: RUN_WINDOW_END
        value: "20:00"
      - key: RUN_WINDOW_DAYS
        value: "Sat,Sun"
      - key: GITHUB_BRANCH
        value: main
      # Required (set in Render dashboard, do NOT commit values):
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
